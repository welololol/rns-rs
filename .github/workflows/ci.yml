name: CI

on:
  push:
    branches:
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-test:
    name: Cargo Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build hook WASM examples
        run: ./rns-hooks/build-examples.sh

      - name: Run workspace tests
        run: cargo test --workspace

  cargo-test-hooks:
    name: Cargo Test (rns-hooks)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build hook WASM examples
        run: ./rns-hooks/build-examples.sh

      - name: Run workspace tests with rns-hooks
        run: cargo test --workspace --features rns-hooks

      - name: Run built-in hook integration tests
        run: |
          cargo test -p rns-net --features rns-hooks-builtin --test e2e_hooks builtin
          cargo test -p rns-ctl --features rns-hooks-builtin test_hook_api_loads_reloads_lists_and_unloads_builtin_hook

  cargo-test-rns-ctl-tls:
    name: Cargo Test (rns-ctl tls)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.93.1

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run rns-ctl tests with tls
        run: cargo test -p rns-ctl --features tls

  armv7-build-smoke:
    name: ARMv7 Build Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: armv7-unknown-linux-gnueabihf

      - name: Install ARMv7 cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build ARMv7 runtime binaries without hooks
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          AR_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
        run: |
          cargo build --release --target armv7-unknown-linux-gnueabihf --no-default-features -p rns-cli --bin rnsd
          cargo build --release --target armv7-unknown-linux-gnueabihf --no-default-features -p rns-ctl

      - name: Build ARMv7 runtime binaries with native hooks
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          AR_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
        run: |
          cargo build --release --target armv7-unknown-linux-gnueabihf --no-default-features -p rns-cli --bin rnsd --features rns-hooks-native
          cargo build --release --target armv7-unknown-linux-gnueabihf --no-default-features -p rns-ctl --features rns-hooks-native

      - name: Build ARMv7 rns-server with built-in hooks
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          AR_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
        run: cargo build --release --target armv7-unknown-linux-gnueabihf --no-default-features -p rns-server --features rns-hooks-builtin

  rns-ctl-web-smoke:
    name: rns-ctl-web-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run app smoke test
        run: node --test rns-ctl/assets/app.smoke.test.js

  docker-e2e:
    name: Docker E2E
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Docker end-to-end suite
        run: ./tests/docker/run-all.sh

  rustfmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust with rustfmt
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt

      - name: Run rustfmt check
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust with Clippy
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: bash scripts/lint-host.sh
